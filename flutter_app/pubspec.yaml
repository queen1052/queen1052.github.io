name: queen_site_flutter
description: A Flutter Web site generated from existing markdown content
publish_to: 'none'
version: 0.1.0
environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown: ^0.6.10
  http: ^0.13.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/posts/
    - assets/img/
