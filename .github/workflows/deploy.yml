name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        # Use npm ci for deterministic installs (package-lock.json is committed)
        run: |
          cd site
          npm ci
      - name: Build
        # Vite plugin generates posts.json, sitemap.xml, and feed.xml during build
        run: |
          cd site
          npm run build
      - name: Copy index to 404
        # SPA deep-link support: GitHub Pages serves 404.html as fallback for unknown paths
        run: cp -a site/dist/index.html site/dist/404.html
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/dist

